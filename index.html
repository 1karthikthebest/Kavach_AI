
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAVACH AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;

background:
radial-gradient(
circle at top,
#182848,
#0f172a,
#020617
);

color:white;

min-height:100vh;

padding:22px;

overflow-x:hidden;

transition:1s;

}

body::before{

content:"";

position:fixed;

inset:0;

background:

linear-gradient(
rgba(255,255,255,.03)
1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(255,255,255,.03)
1px,
transparent 1px
);

background-size:
50px 50px;

animation:
grid 20s linear infinite;

pointer-events:none;

}

@keyframes grid{

to{

transform:
translateY(50px);

}

}

.container{

max-width:760px;

margin:auto;

padding:28px;

border-radius:30px;

background:
rgba(255,255,255,.04);

backdrop-filter:
blur(18px);

box-shadow:
0 0 80px rgba(77,227,255,.15);

}

h1{

font-family:
Algerian,
serif;

font-size:
3.7rem;

text-align:center;

letter-spacing:4px;

text-shadow:

0 0 20px #4de3ff,

0 0 70px rgba(77,227,255,.4);

}

.subtitle{

text-align:center;

opacity:.8;

margin-top:10px;

margin-bottom:30px;

}

input,
textarea{

width:100%;

padding:18px;

margin-top:14px;

background:
rgba(255,255,255,.05);

border:none;

border-radius:18px;

color:white;

outline:none;

}

textarea{

height:220px;

resize:none;

}

button{

width:100%;

padding:18px;

margin-top:18px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:700;

cursor:pointer;

background:

linear-gradient(
90deg,
#4de3ff,
#5dff9d
);

}

button:hover{

transform:
translateY(-2px);

}

.hidden{

display:none;

}

.progress{

height:24px;

background:#111827;

border-radius:999px;

overflow:hidden;

margin-top:20px;

}

#bar{

height:100%;

width:0;

display:flex;

align-items:center;

justify-content:center;

font-weight:700;

transition:1s;

}

.safe{

background:
#00d26a;

}

.warning{

background:
orange;

}

.danger{

background:
red;

}

#badge{

margin-top:15px;

padding:12px;

border-radius:14px;

text-align:center;

font-weight:700;

}

#reason{

margin-top:20px;

line-height:1.8;

}

.card{

margin-top:25px;

padding:18px;

border-radius:18px;

background:
rgba(255,255,255,.04);

}

.history{

margin-top:10px;

font-size:14px;

opacity:.85;

}

.typing{

animation:
blink 1s infinite;

}

@keyframes blink{

50%{

opacity:.5;

}

}

</style>

</head>

<body>

<div class="container">

<h1>KAVACH AI</h1>

<div class="subtitle">

AI Powered Scam Detection

</div>

<input
id="api"
type="password"
placeholder="🔑 Paste Gemini API Key">

<textarea
id="msg"
placeholder="Paste suspicious message..."></textarea>

<button
onclick="scan()">

🛡 Scan Now

</button>

<div
id="result"
class="hidden">

<div class="progress">

<div id="bar">

0%

</div>

</div>

<div id="badge">

Waiting...

</div>

<div id="reason">

</div>

<button
onclick="speak()">

🔊 Read Analysis

</button>

<div class="card">

<b>Detected URLs</b>

<div id="urls">

None

</div>

</div>

<div class="card">

<b>Scan History</b>

<div
id="history"
class="history">

Empty

</div>

</div>

</div>

</div>

<script>

let last=""

loadHistory()

async function scan(){

let api=
apiField()

let msg=
msgField()

if(!api||!msg){

alert(
"Enter API + Message"
)

return

}

show()

type()

detectUrls(
msg
)

try{

let r=

await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${api}`,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

contents:[

{

parts:[

{

text:`

You are KAVACH AI.

Return ONLY JSON.

{
"score":0,
"verdict":"",
"reason":""
}

Message:

${msg}

`

}

]

}

]

})

}

)

let data=
await r.json()

let text=

data
.candidates[0]
.content
.parts[0]
.text

text=
text
.replace(
/```json/g,
""
)
.replace(
/```/g,
""
)

let out=
JSON.parse(
text
)

last=
out.reason

paint(
out.score
)

reason.innerHTML=

`
<h2>
${out.verdict}
</h2>

${out.reason}

`

save(
out.score,
out.verdict
)

}
catch{

reason.innerHTML=

"❌ Failed"

}

}

function paint(score){

let b=bar

b.style.width=
score+"%"

b.innerHTML=
score+"%"

b.className=""

if(score<30){

b.classList
.add(
"safe"
)

badge.innerHTML=
"🟢 SAFE"

document.body.style.boxShadow=
"0 0 180px green"

}

else if(score<70){

b.classList
.add(
"warning"
)

badge.innerHTML=
"🟡 SUSPICIOUS"

document.body.style.boxShadow=
"0 0 180px orange"

}

else{

b.classList
.add(
"danger"
)

badge.innerHTML=
"🔴 HIGH RISK"

document.body.style.boxShadow=
"0 0 180px red"

}

}

function speak(){

speechSynthesis
.speak(

new SpeechSynthesisUtterance(
last
)

)

}

function detectUrls(t){

let u=

t.match(
/https?:\/\/[^\s]+/g
)

urls.innerHTML=

u
?
u.join("<br>")
:
"None"

}

function save(s,v){

let h=

JSON.parse(

localStorage
.getItem(
"kavach"
)

||
"[]"

)

h.unshift(
`${s}% • ${v}`
)

h=h.slice(
0,
6
)

localStorage
.setItem(
"kavach",

JSON.stringify(
h
)

)

loadHistory()

}

function loadHistory(){

let h=

JSON.parse(

localStorage
.getItem(
"kavach"
)

||
"[]"

)

history.innerHTML=

h.join("<br>")

||

"Empty"

}

function show(){

result.classList
.remove(
"hidden"
)

}

function type(){

reason.innerHTML=

`
<div class="typing">

🧠 Checking urgency...<br>
🔍 Detecting patterns...<br>
🛡 Finalizing...

</div>

`

}

function apiField(){

return api.value

}

function msgField(){

return msg.value

}

</script>

</body>
</html>
