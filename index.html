<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width,initial-scale=1">

<title>🛡 KAVACH AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
radial-gradient(
circle at top,
#16233f,
#0f172a 40%,
#020617
);

min-height:100vh;

display:flex;

justify-content:center;

padding:40px;

font-family:
Arial;

color:white;

overflow-x:hidden;

}

.container{

width:760px;

max-width:100%;

padding:40px;

border-radius:30px;

background:

rgba(
255,
255,
255,
0.04
);

backdrop-filter:
blur(24px);

box-shadow:

0 0 120px
rgba(
77,
227,
255,
0.15
);

border:

1px solid
rgba(
255,
255,
255,
0.08
);

}

h1{

font-family:

Algerian,
serif;

font-size:

4rem;

text-align:center;

letter-spacing:4px;

color:

#d9f6ff;

text-shadow:

0 0 30px
#4de3ff,

0 0 80px
rgba(
77,
227,
255,
.5
);

margin-bottom:12px;

}

.subtitle{

text-align:center;

font-size:18px;

opacity:.8;

margin-bottom:30px;

}

input,
textarea{

width:100%;

border:none;

outline:none;

padding:18px;

border-radius:20px;

background:

rgba(
255,
255,
255,
0.05
);

color:white;

font-size:16px;

box-shadow:

inset 0 0 25px
rgba(
255,
255,
255,
0.03
);

}

input{

margin-bottom:15px;

}

textarea{

height:230px;

resize:none;

}

input:focus,
textarea:focus{

box-shadow:

0 0 35px
rgba(
77,
227,
255,
.25
);

}

button{

margin-top:18px;

width:100%;

padding:18px;

border:none;

border-radius:20px;

cursor:pointer;

font-size:20px;

font-weight:700;

background:

linear-gradient(

90deg,

#4de3ff,

#5dff9d

);

transition:.35s;

}

button:hover{

transform:

translateY(-4px)
scale(1.02);

box-shadow:

0 0 60px
rgba(
93,
255,
157,
.4
);

}

.hidden{
display:none;
}

#result{

margin-top:30px;

padding:25px;

border-radius:22px;

background:

rgba(
255,
255,
255,
0.03
);

}

.progress{

height:28px;

background:#101726;

border-radius:999px;

overflow:hidden;

margin-bottom:18px;

}

#bar{

height:100%;

width:0;

display:flex;

justify-content:center;

align-items:center;

font-weight:700;

transition:1.2s;

}

.safe{

background:

linear-gradient(
90deg,
#00c853,
#00ff95
);

}

.warning{

background:

linear-gradient(
90deg,
orange,
#ffd966
);

}

.danger{

background:

linear-gradient(
90deg,
#ff1744,
#ff5252
);

}

#reason{

font-size:17px;

line-height:1.9;

}

.glow{

animation:
pulse
2s infinite;

}

@keyframes pulse{

0%{

box-shadow:
0 0 0;

}

50%{

box-shadow:

0 0 80px
rgba(
77,
227,
255,
.2
);

}

100%{

box-shadow:
0 0 0;

}

}

</style>

</head>

<body>

<div class="container glow">

<h1>
KAVACH AI
</h1>

<p class="subtitle">

AI Powered Scam Detection

</p>

<input

type="password"

id="api"

placeholder=
"🔑 Enter Gemini API"

>

<textarea

id="msg"

placeholder=
"Paste suspicious SMS / Email / WhatsApp..."

></textarea>

<button
onclick="scan()">

🛡 SCAN NOW

</button>

<div
id="result"

class="hidden">

<div class="progress">

<div id="bar">

0%

</div>

</div>

<div id="reason">

Waiting...

</div>

</div>

</div>

<script>

async function scan(){

const api=
document
.getElementById(
"api"
).value

const msg=
document
.getElementById(
"msg"
).value

if(!api||!msg){

alert(
"Enter API + Message"
)

return

}

document
.getElementById(
"result"
)
.classList
.remove(
"hidden"
)

document
.getElementById(
"reason"
)
.innerHTML=

"🧠 AI scanning..."

try{

const r=

await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${api}`,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

contents:[

{

parts:[

{

text:
`

Analyze scam probability.

Return JSON:

{
"score":0,
"reason":""
}

Message:

${msg}

`

}

]

}

]

})

}

)

const data=
await r.json()

let text=

data
.candidates[0]
.content
.parts[0]
.text

text=
text
.replace(
/```json/g,
""
)
.replace(
/```/g,
""
)

const result=
JSON.parse(
text
)

updateBar(
result.score
)

document
.getElementById(
"reason"
)
.innerHTML=

result.reason

}

catch(e){

document
.getElementById(
"reason"
)
.innerHTML=

"❌ Scan Failed"

}

}

function updateBar(score){

let bar=
document
.getElementById(
"bar"
)

bar.style.width=
score+"%"

bar.innerHTML=
score+"%"

bar.className=""

if(score<30){

bar.classList
.add(
"safe"
)

}

else if(score<70){

bar.classList
.add(
"warning"
)

}

else{

bar.classList
.add(
"danger"
)

}

}

</script>

</body>

</html>
