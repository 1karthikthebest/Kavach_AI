<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width,initial-scale=1">

<title>KAVACH AI</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>
KAVACH AI
</h1>

<div class="subtitle">

AI Powered Scam Detection

</div>

<input
id="api"
type="password"
placeholder="🔑 Paste Gemini API Key">

<textarea
id="msg"
placeholder=
"Paste suspicious SMS / WhatsApp / Email...">

</textarea>

<button onclick="scan()">

🛡 Scan Now

</button>

<div
id="result"
class="hidden">

<div class="progress">

<div id="bar">

0%

</div>

</div>

<div id="badge">

Waiting...

</div>

<div id="reason">

</div>

<button
onclick="speak()">

🔊 Read Analysis

</button>

<div class="card">

<b>Detected URLs</b>

<div id="urls">

None

</div>

</div>

<div class="card">

<b>Scan History</b>

<div id="history">

Empty

</div>

</div>

</div>

<script src="script.js">

</script>

</body>

</html>
