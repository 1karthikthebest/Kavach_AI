<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width,initial-scale=1">

<title>🛡 KAVACH AI</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{

margin:0;

background:#0f172a;

color:white;

display:flex;

justify-content:center;

padding:30px;

}

.container{

width:700px;

max-width:100%;

}

h1{

text-align:center;

font-size:3rem;

color:aliceblue;

font-family:
Algerian,
serif;

}

p{

text-align:center;

color:
rgba(
255,
255,
255,
.75
);

}

input,
textarea{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:
rgba(
255,
255,
255,
.05
);

color:white;

font-size:16px;

outline:none;

}

textarea{

height:220px;

margin-top:12px;

}

button{

width:100%;

padding:15px;

margin-top:15px;

font-size:18px;

background:

linear-gradient(
90deg,
#4de3ff,
#5dff9d
);

border:none;

border-radius:14px;

cursor:pointer;

font-weight:700;

color:#04101d;

}

.hidden{
display:none;
}

#result{
margin-top:25px;
}

.progress{

height:24px;

background:#222;

border-radius:20px;

overflow:hidden;

}

#bar{

height:100%;

width:0;

transition:1s;

display:flex;

justify-content:center;

align-items:center;

font-weight:700;

}

.safe{
background:#00d26a;
}

.warning{
background:orange;
}

.danger{
background:red;
}

#reason{

margin-top:20px;

line-height:1.8;

}

</style>

</head>

<body>

<div class="container">

<h1>
🛡 KAVACH AI
</h1>

<p>

Enter Gemini API
and scan message

</p>

<input

type="password"

id="api"

placeholder=
"Enter Gemini API Key"

>

<br><br>

<textarea

id="msg"

placeholder=
"Paste suspicious message..."

></textarea>

<button
onclick="scan()">

🔍 Analyze

</button>

<div

id="result"

class="hidden"

>

<h2>

AI Checked

</h2>

<div class="progress">

<div id="bar">

0%

</div>

</div>

<div id="reason">

Waiting...

</div>

</div>

</div>

<script>

async function scan(){

const api=

document
.getElementById(
"api"
)
.value

const msg=

document
.getElementById(
"msg"
)
.value

if(
!api ||
!msg
){

alert(
"Enter API and Message"
)

return

}

document
.getElementById(
"result"
)
.classList
.remove(
"hidden"
)

document
.getElementById(
"reason"
)
.innerHTML=

"🧠 AI Scanning..."

try{

const r=

await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${api}`,

{

method:
"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

contents:[

{

parts:[

{

text:

`
You are scam detector.

Analyze message.

Return ONLY:

{
"score":0,
"reason":""
}

Message:

${msg}

`

}

]

}

]

})

}

)

const data=
await r.json()

let text=

data
.candidates[0]
.content
.parts[0]
.text

text=

text
.replace(
/```json/g,
""
)
.replace(
/```/g,
""
)

const result=

JSON.parse(
text
)

updateBar(
result.score
)

document
.getElementById(
"reason"
)
.innerHTML=

result.reason

}

catch(e){

document
.getElementById(
"reason"
)
.innerHTML=

"❌ Invalid API / Error"

console.log(
e
)

}

}

function updateBar(
score
){

const bar=

document
.getElementById(
"bar"
)

bar.style.width=
score+"%"

bar.innerText=
score+"%"

bar.className=""

if(
score<30
){

bar.classList
.add(
"safe"
)

}

else if(
score<70
){

bar.classList
.add(
"warning"
)

}

else{

bar.classList
.add(
"danger"
)

}

}

</script>

</body>

</html>
